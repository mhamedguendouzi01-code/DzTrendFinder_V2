<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DzTrendFinder - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 15px; width: 280px; overflow: hidden; transition: 0.3s; padding: 10px; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: contain; background: #fafafa; border-radius: 8px; }
        .platform { background: #333; color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; display: inline-block; margin: 10px 0; }
        .title { font-size: 15px; font-weight: 600; color: #333; height: 45px; overflow: hidden; margin-bottom: 10px; }
        .price { color: #27ae60; font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .btn { display: block; text-align: center; background: #007bff; color: white; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: 500; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image_url }}" alt="Product Image">
        <span class="platform">{{ product.platform }}</span>
        <div class="title">{{ product.title }}</div>
        <div class="price">${{ product.price }}</div>
        <a href="{{ product.url }}" target="_blank" class="btn">Voir le produit</a>
    </div>
    {% endfor %}
</body>
</html>
